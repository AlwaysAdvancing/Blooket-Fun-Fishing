<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bookmarklet Maker</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #btn {
      display: inline-block;
      padding: 10px 16px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: grab;
      user-select: none;
      margin-top: 12px;
    }
    #btn:active { cursor: grabbing; }
    textarea { width: 100%; height: 120px; }
    .row { margin: 10px 0; }
    label { font-weight: 600; }
  </style>
</head>
<body>

  <h2>Bookmarklet Button Generator</h2>

  <div class="row">
    <label>Bookmarklet (javascript:...)</label>
    <textarea id="code" spellcheck="false">PASTE_YOUR_BOOKMARKLET_HERE</textarea>
  </div>

  <div class="row">
    <label>Button text / bookmark name (leave blank for “nothing”)</label>
    <input id="name" placeholder="(blank = nothing)" />
  </div>

  <button onclick="make()">Generate</button>

  <div class="row">
    <!-- This is the draggable “button” -->
    <a id="btn" draggable="true" href="javascript:alert('hi')">&#8203;</a>
  </div>

  <p style="color:#666">
    Drag the blue button to your Bookmarks Bar.
    (Some browsers may not perfectly allow truly “empty” bookmark names; using a zero-width space helps.)
  </p>
